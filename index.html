      --color-secondary-text: #595959;
      --font-flash: "Rubik", "Noto Sans TC", sans-serif;

  <style>
    /* ── 全域 ── */
    body {
      font-family: "Rubik", "Noto Sans TC", sans-serif;
    }

    /* ── 漸層工具 ── */
    .gradient-mango          { background: linear-gradient(135deg, #ffbe40 0%, #fb8e30 100%); }
    .gradient-mango-horizontal { background: linear-gradient(90deg, #ffbe40 0%, #fb8e30 100%); }

    .text-gradient-mango {
      background: linear-gradient(135deg, #ffbe40 0%, #fb8e30 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── 視圖切換 ── */
    .view        { display: none; }
    .view.active { display: block; }

    /* ── 國家卡片 ── */
    .country-card {
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }
    .country-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(251,142,48,0.18);
      border-color: #fdd2ac;
    }
    .country-card:active { transform: translateY(-1px); }
    .country-card .card-arrow     { transition: transform 0.2s ease; }
    .country-card:hover .card-arrow { transform: translateX(3px); }

    /* ── 方案卡片 ── */
    .plan-card {
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
    }
    .plan-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(251,142,48,0.15);
    }
    .plan-card.recommended { border-color: #fdd2ac; }
    .plan-card.selected {
      border-color: #fb8e30;
      background: #fff8ee;
      box-shadow: 0 4px 16px rgba(251,142,48,0.25);
    }

    /* ── 無限流量卡片 ── */
    .unlimited-card {
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .unlimited-card.selected {
      border-color: #fb8e30;
      background: #fff8ee;
      box-shadow: 0 4px 16px rgba(251,142,48,0.25);
    }

    /* ── 天數 Tab ── */
    .dur-tab {
      cursor: pointer;
      border: 2px solid #e5e7eb;
      white-space: nowrap;
      transition: all 0.2s ease;
    }
    .dur-tab:hover  { border-color: #fca559; background: #fff8ee; }
    .dur-tab.active { border-color: #fb8e30; background: #fff8ee; color: #fb8e30; }

    .dur-tabs-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .dur-tabs-scroll::-webkit-scrollbar { display: none; }

    /* ── 結帳列 ── */
    #checkout-bar { transition: transform 0.3s ease, opacity 0.3s ease; }
    #checkout-bar.hidden-bar {
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
    }

    /* ── 小工具 ── */
    .badge-popular {
      background: linear-gradient(135deg, #ffbe40 0%, #fb8e30 100%);
      color: white;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      letter-spacing: 0.02em;
    }

    .feature-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: #595959;
      background: #f5f5f5;
      border-radius: 99px;
      padding: 2px 8px;
    }

    .per-day-price { font-size: 11px; color: #9ca3af; }

    #bar-plan-detail { font-size: 11px; color: #595959; }

    #back-btn { cursor: pointer; transition: all 0.2s ease; }
    #back-btn:hover { color: #fb8e30; }

    input[type="date"] { color-scheme: light; }
  </style>
</head>

                <div class="text-lg font-bold text-gradient-mango">NT$${startPrice}</div>
              </div>
              <i class="iconoir-arrow-right card-arrow text-mango-orange-40" style="font-size:18px"></i>
            </div>
          </div>
        `;
      }).join('');
    }

    // ── 方案渲染 ──────────────────────────────
    function getDurationTabs(plans) {
      const seen = new Set();
      const durations = [];
      plans.forEach(p => {
        const key = String(p.duration);
        if (!seen.has(key)) { seen.add(key); durations.push(key); }
      });
      return durations.sort((a, b) => Number(a) - Number(b));
    }

    function renderPlans(countryCode) {
      const country = PRODUCTS[countryCode];
      const container = document.getElementById('plans-container');
      const tabs = getDurationTabs(country.plans);

      if (!durTabState[countryCode]) durTabState[countryCode] = tabs[0];
      const activeDur = durTabState[countryCode];

      // Tab 列
      let tabsHtml = `<div class="mb-6">
        <h2 class="text-sm font-semibold text-secondary-text uppercase tracking-wider mb-3">選擇天數</h2>
        <div class="dur-tabs-scroll flex gap-2 pb-1">`;

      tabs.forEach(dur => {
        const label = dur === 'bundle' ? '套組' : `${dur} 天`;
        tabsHtml += `<button class="dur-tab ${dur === activeDur ? 'active' : 'text-gray-600'} px-4 py-2 rounded-full text-sm font-semibold"
          onclick="switchDurTab('${countryCode}', '${dur}')">${label}</button>`;
      });

      if (country.unlimited) {
        tabsHtml += `<button class="dur-tab ${activeDur === 'unlimited' ? 'active' : 'text-gray-600'} px-4 py-2 rounded-full text-sm font-semibold"
          onclick="switchDurTab('${countryCode}', 'unlimited')">無限流量</button>`;
      }
      tabsHtml += `</div></div>`;

      // 方案內容
      let contentHtml = '';
      if (activeDur === 'unlimited') {
        contentHtml = renderUnlimitedSection(country);
      } else {
        const plans = country.plans.filter(p => String(p.duration) === activeDur);
        contentHtml = `<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">${plans.map(p => renderPlanCard(p)).join('')}</div>`;
      }

      container.innerHTML = tabsHtml + contentHtml;

      // 恢復已選狀態
      if (selectedPlan) {
        const card = document.querySelector(`.plan-card[data-id="${selectedPlan.id}"]`);
        if (card) card.classList.add('selected');
        if (selectedPlan.type === 'unlimited') {
          const ulCard = document.querySelector('.unlimited-card');
          if (ulCard) { ulCard.classList.add('selected'); calcUnlimitedPrice(countryCode); }
        }
      }
    }

    function switchDurTab(countryCode, dur) {
      durTabState[countryCode] = dur;
      renderPlans(countryCode);
    }

    function renderPlanCard(p) {
      const isBundle = p.isBundle;
      const isRecommended = RECOMMENDED[currentCountry] === p.id;
      const perDay = (!isBundle && p.duration > 0) ? `NT$${Math.round(p.price / p.duration)}/天` : '';
      const durationBadge = isBundle
        ? `<span class="text-xs px-2 py-0.5 rounded-full bg-sky-100 text-sky-600 font-semibold">套組</span>`
        : `<span class="text-xs px-2 py-0.5 rounded-full bg-orange-50 text-mango-orange font-semibold">${p.duration}天</span>`;

      return `
        <div class="plan-card ${isRecommended ? 'recommended' : ''} bg-white rounded-2xl p-4 shadow-sm"
             data-id="${p.id}" onclick="selectPlan('${p.id}', '${currentCountry}')">
          <div class="flex items-center gap-2 flex-wrap mb-3">
            ${isRecommended ? '<span class="badge-popular">最受歡迎</span>' : ''}
            ${durationBadge}
          </div>
          <p class="font-bold text-primary-text mb-3">
            ${isBundle ? p.bundleDesc : `每日 ${p.traffic}（共 ${p.totalGB}）`}
          </p>
          <div class="flex items-end justify-between">
            <span class="per-day-price">${perDay}</span>
            <span class="text-xl font-bold text-gradient-mango">NT$${p.price.toLocaleString()}</span>
          </div>
        </div>`;
    }

    function renderUnlimitedSection(country) {
      const ul = country.unlimited;
      const today = new Date();
      const todayStr = today.toISOString().split('T')[0];
      const defaultEnd = new Date(today);
      defaultEnd.setDate(defaultEnd.getDate() + 6);
      const defaultEndStr = defaultEnd.toISOString().split('T')[0];

      return `
        <div class="mb-6">
          <h2 class="text-sm font-semibold text-secondary-text uppercase tracking-wider mb-4">無限流量方案</h2>
          <div class="unlimited-card bg-white rounded-2xl p-5 shadow-sm" onclick="selectUnlimited('${currentCountry}')">
            <div class="flex justify-between items-start mb-4">
              <div>
                <p class="font-bold text-primary-text mt-0.5">吃到飽（FUP ${ul.fup}）</p>
                <p class="text-xs text-secondary-text mt-1">${ul.network}${ul.note ? ' · ' + ul.note : ''}</p>
              </div>
              <span class="text-xs px-2 py-0.5 rounded-full bg-green-50 text-green-600 font-semibold">無限流量</span>
            </div>
            <div class="bg-gray-50 rounded-xl p-4 mt-2" onclick="event.stopPropagation()">
              <p class="text-xs font-semibold text-secondary-text mb-3">選擇使用日期</p>
              <div class="flex flex-col sm:flex-row gap-3">
                <div class="flex-1">
                  <label class="text-xs text-secondary-text block mb-1">開始日期</label>
                  <input type="date" id="ul-start-${currentCountry}" value="${todayStr}" min="${todayStr}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-mango-orange"
                    onchange="calcUnlimitedPrice('${currentCountry}')" />
                </div>
                <div class="flex-1">
                  <label class="text-xs text-secondary-text block mb-1">結束日期</label>
                  <input type="date" id="ul-end-${currentCountry}" value="${defaultEndStr}" min="${todayStr}"
                    class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-mango-orange"
                    onchange="calcUnlimitedPrice('${currentCountry}')" />
                </div>
              </div>
              <div class="mt-3 flex items-center justify-between">
                <span class="text-xs text-secondary-text" id="ul-days-${currentCountry}">共 7 天</span>
                <div class="text-right">
                  <span class="text-xs text-secondary-text">NT$${ul.dailyPrice > 0 ? ul.dailyPrice : '—'} / 天 × </span>
                  <span class="text-xl font-bold text-gradient-mango" id="ul-price-${currentCountry}">
                    ${ul.dailyPrice > 0 ? 'NT$' + (ul.dailyPrice * 7).toLocaleString() : 'NT$0'}
                  </span>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    }

    // ── 互動邏輯 ──────────────────────────────
    function selectPlan(planId, countryCode) {
      const plan = PRODUCTS[countryCode].plans.find(p => p.id === planId);
      if (!plan) return;

      document.querySelectorAll('.plan-card.selected, .unlimited-card.selected').forEach(el => el.classList.remove('selected'));
      document.querySelector(`.plan-card[data-id="${planId}"]`)?.classList.add('selected');

      const country = PRODUCTS[countryCode];
      selectedPlan = {
        id: plan.id,
        name: `${country.flag} ${country.name} ${plan.isBundle ? plan.bundleDesc : plan.duration + '天 每日' + plan.traffic}`,
        price: plan.price,
        type: 'fixed'
      };
      updateCheckoutBar();
    }

    function selectUnlimited(countryCode) {
      document.querySelectorAll('.plan-card.selected, .unlimited-card.selected').forEach(el => el.classList.remove('selected'));
      document.querySelector('.unlimited-card')?.classList.add('selected');
      calcUnlimitedPrice(countryCode);
    }

    function calcUnlimitedPrice(countryCode) {
      const ul = PRODUCTS[countryCode].unlimited;
      const startInput = document.getElementById(`ul-start-${countryCode}`);
      const endInput   = document.getElementById(`ul-end-${countryCode}`);
      if (!startInput || !endInput) return;

      const start = new Date(startInput.value);
      const end   = new Date(endInput.value);
      if (end < start) { endInput.value = startInput.value; return calcUnlimitedPrice(countryCode); }

      const days  = Math.round((end - start) / 86400000) + 1;
      const price = ul.dailyPrice * days;

      const daysLabel  = document.getElementById(`ul-days-${countryCode}`);
      const priceLabel = document.getElementById(`ul-price-${countryCode}`);
      if (daysLabel)  daysLabel.textContent  = `共 ${days} 天`;
      if (priceLabel) priceLabel.textContent = ul.dailyPrice > 0 ? `NT$${price.toLocaleString()}` : 'NT$0';

      const card = document.querySelector('.unlimited-card');
      if (card?.classList.contains('selected')) {
        const country = PRODUCTS[countryCode];
        selectedPlan = {
          id: ul.id,
          name: `${country.flag} ${country.name} 無限流量 ${days}天`,
          price, type: 'unlimited', days
        };
        updateCheckoutBar();
      }
    }

    function updateCheckoutBar() {
      const bar      = document.getElementById('checkout-bar');
      const nameEl   = document.getElementById('bar-plan-name');
      const detailEl = document.getElementById('bar-plan-detail');
      const priceEl  = document.getElementById('bar-price');

      if (!selectedPlan) { bar.classList.add('hidden-bar'); return; }

      bar.classList.remove('hidden-bar');
      nameEl.textContent = selectedPlan.name;

      if (selectedPlan.type === 'unlimited') {
        detailEl.textContent = `無限流量 · ${selectedPlan.days} 天`;
      } else {
        const plan = PRODUCTS[currentCountry]?.plans.find(p => p.id === selectedPlan.id);
        if (plan && !plan.isBundle) {
          detailEl.textContent = `${plan.duration} 天 · 每日 ${plan.traffic} · NT$${Math.round(plan.price / plan.duration)}/天`;
        } else {
          detailEl.textContent = plan?.bundleDesc ?? '';
        }
      }

      priceEl.textContent = `NT$${selectedPlan.price.toLocaleString()}`;
    }

    // ── 初始化 ────────────────────────────────
    renderCountryGrid();
  </script>
